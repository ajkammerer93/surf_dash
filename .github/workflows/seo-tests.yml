name: SEO Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  seo-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run SEO tests
        run: pytest tests/test_seo.py -v
